name: Security Scan

on:
  push:
    branches:
      - master
      - main
      - renovate/**
  pull_request:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    name: Trivy security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@v0.36.0
        if: ${{ ! github.event.schedule }}
        with:
          scan-type: fs
          ignore-unfixed: true
          exit-code: 1
          severity: "HIGH,CRITICAL"
          skip-dirs: "build"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Run Trivy vulnerability scanner sarif output
        uses: aquasecurity/trivy-action@v0.36.0
        if: ${{ github.event.schedule }}
        with:
          scan-type: fs
          ignore-unfixed: true
          severity: "HIGH,CRITICAL"
          format: template
          template: "@/contrib/sarif.tpl"
          output: trivy-results.sarif
          skip-dirs: "build"
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ github.event.schedule }}
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  grype:
    name: Grype security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Grype exclusion config
        run: |
          cat <<'EOF' > .grype.yaml
          exclude:
            - '**/build/**'
          EOF

      - name: Run Grype vulnerability scanner in repo mode (attempt 1)
        uses: anchore/scan-action@v7
        if: ${{ ! github.event.schedule }}
        id: grype-inline-attempt-1
        continue-on-error: true
        with:
          path: .
          config: .grype.yaml
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          cache-db: true
          output-format: table

      - name: Run Grype vulnerability scanner in repo mode (attempt 2)
        uses: anchore/scan-action@v7
        if: ${{ ! github.event.schedule && steps.grype-inline-attempt-1.outcome == 'failure' }}
        id: grype-inline-attempt-2
        continue-on-error: true
        with:
          path: .
          config: .grype.yaml
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          cache-db: true
          output-format: table

      - name: Ensure inline Grype scan succeeds
        if: ${{ ! github.event.schedule && steps.grype-inline-attempt-1.outcome == 'failure' && steps.grype-inline-attempt-2.outcome == 'failure' }}
        run: exit 1

      - name: Run Grype vulnerability scanner sarif output (attempt 1)
        uses: anchore/scan-action@v7
        if: ${{ github.event.schedule }}
        id: grype-sarif-attempt-1
        continue-on-error: true
        with:
          path: .
          config: .grype.yaml
          output-format: sarif
          output-file: grype-results.sarif
          only-fixed: true
          cache-db: true

      - name: Run Grype vulnerability scanner sarif output (attempt 2)
        uses: anchore/scan-action@v7
        if: ${{ github.event.schedule && steps.grype-sarif-attempt-1.outcome == 'failure' }}
        id: grype-sarif-attempt-2
        continue-on-error: true
        with:
          path: .
          config: .grype.yaml
          output-format: sarif
          output-file: grype-results.sarif
          only-fixed: true
          cache-db: true

      - name: Ensure scheduled Grype scan succeeds
        if: ${{ github.event.schedule && steps.grype-sarif-attempt-1.outcome == 'failure' && steps.grype-sarif-attempt-2.outcome == 'failure' }}
        run: exit 1

      - name: Upload Grype scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ github.event.schedule }}
        with:
          sarif_file: grype-results.sarif
          category: grype
